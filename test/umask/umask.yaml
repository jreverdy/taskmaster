Umask:
    cmd: "./umask.sh"
    numprocs: 1
    umask: 022
    workingdir: ./test/umask
    autostart: true
    autorestart: unexpected
    exitcodes:
        - 0
        - 2
    startretries: 3
    starttime: 0
    stopsignal: SIGTERM
    stoptime: 3
    stdout: ./logout.stdout
    stderr: ./logerr.stderr
    env:
        STARTED_BY: taskmaster
        ANSWER: "42"